services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: english_tool
      POSTGRES_PASSWORD: english_tool_pw
      POSTGRES_DB: english_tool
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U english_tool"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://english_tool:english_tool_pw@db:5432/english_tool
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SMTP_EMAIL: ${SMTP_EMAIL}
      SMTP_APP_PASSWORD: ${SMTP_APP_PASSWORD}
      E2E_TEST: ${E2E_TEST:-0}
    volumes:
      - filestore:/app/generated_files
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    depends_on:
      - backend

volumes:
  pgdata:
  filestore:
